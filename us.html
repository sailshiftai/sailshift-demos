<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boat Listings — Powered by SailShift AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#0d3b6e;--accent-l:#1a5a9e;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--bg:#f3f4f6;--card:#fff;--r:12px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--accent);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.hdr-logo{display:flex;align-items:center;gap:10px;color:#fff}
.logo-mk{width:34px;height:34px;background:rgba(255,255,255,.18);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-.5px}
.logo-nm{font-weight:700;font-size:17px;letter-spacing:-.3px}
.hdr-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.88);padding:5px 13px;border-radius:20px;font-size:11.5px;font-weight:500;letter-spacing:.4px}
.hero{background:linear-gradient(150deg,var(--accent) 0%,#071d38 100%);color:#fff;padding:2.75rem 2rem 2.25rem;text-align:center}
.hero h1{font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:800;letter-spacing:-.5px;margin-bottom:.4rem}
.hero p{color:rgba(255,255,255,.72);font-size:.9rem;margin-bottom:1.75rem}
.tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.tab{padding:9px 22px;border-radius:50px;border:2px solid rgba(255,255,255,.35);background:transparent;color:rgba(255,255,255,.78);font-family:inherit;font-size:.83rem;font-weight:500;cursor:pointer;transition:all .18s}
.tab:hover{border-color:rgba(255,255,255,.65);color:#fff}
.tab.active{background:#fff;color:var(--accent);border-color:#fff;font-weight:700}
.stats{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.stats-txt{font-size:.85rem;color:var(--muted)}.stats-txt strong{color:var(--text)}
.stats-sort{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--muted)}
.sort-sel{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:.8rem;font-family:inherit;color:var(--text);background:#fff;cursor:pointer;outline:none}
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.125rem}
@media(max-width:960px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.grid{grid-template-columns:1fr}.wrap{padding:1rem 1rem 3rem}.hero{padding:2rem 1rem 2rem}.hdr{padding:0 1rem}}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;cursor:pointer}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06)}
.c-img-wrap{position:relative;overflow:hidden}
.c-img{width:100%;height:200px;object-fit:cover;display:block;background:linear-gradient(135deg,#9db8c8,#5a7f9a)}
.c-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55px;background:linear-gradient(transparent,rgba(0,0,0,.28));pointer-events:none}
.c-price-badge{position:absolute;bottom:9px;right:9px;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);color:#fff;padding:4px 10px;border-radius:6px;font-size:.85rem;font-weight:700}
.c-body{padding:.9rem 1rem 1rem;flex:1;display:flex;flex-direction:column}
.c-title{font-size:.97rem;font-weight:700;color:var(--text);margin-bottom:.2rem;letter-spacing:-.2px}
.c-year{color:var(--muted);font-weight:400;font-size:.85rem}
.c-specs{display:flex;gap:10px;margin:.45rem 0;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:3px;font-size:.73rem;color:var(--muted);font-weight:500}
.c-loc{font-size:.78rem;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:4px}
.c-desc{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:.85rem;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-foot{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-top:auto}
.c-price{font-size:1.1rem;font-weight:800;color:var(--accent)}
.btn-view{background:var(--accent);color:#fff;border:none;padding:8px 15px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:background .18s;font-family:inherit;white-space:nowrap}
.btn-view:hover{background:var(--accent-l)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:500;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:860px;width:100%;margin:auto;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.3);position:relative}
.m-close{position:absolute;top:1rem;right:1rem;width:34px;height:34px;border-radius:50%;border:none;background:#f3f4f6;color:var(--muted);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .18s}
.m-close:hover{background:#e5e7eb}
.m-img{width:100%;height:300px;object-fit:cover;display:block;background:linear-gradient(135deg,#9db8c8,#5a7f9a)}
.m-body{padding:1.75rem 2rem 2rem}
.m-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.m-title-block .m-make{font-size:1.35rem;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.m-title-block .m-sub{font-size:.88rem;color:var(--muted);margin-top:.2rem}
.m-price-block{text-align:right}
.m-price{font-size:1.6rem;font-weight:800;color:var(--accent);white-space:nowrap}
.m-price-note{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;background:#f8f9fa;border-radius:10px;padding:1rem;margin-bottom:1.25rem}
@media(max-width:600px){.spec-grid{grid-template-columns:repeat(2,1fr)}}
.spec-box{background:#fff;border-radius:8px;padding:.6rem .75rem;border:1px solid var(--border)}
.spec-box .sk{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem}
.spec-box .sv{font-size:.88rem;font-weight:600;color:var(--text)}
.m-section{margin-bottom:1.25rem}
.m-section h4{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.spec-tbl{width:100%;border-collapse:collapse}
.spec-tbl tr:not(:last-child) td{border-bottom:1px solid #f3f4f6}
.spec-tbl td{padding:.4rem .2rem;font-size:.83rem;vertical-align:top}
.spec-tbl td:first-child{color:var(--muted);font-weight:500;width:45%;padding-right:.75rem}
.spec-tbl td:last-child{color:var(--text);font-weight:500}
.m-enq-sub{font-size:.8rem;color:var(--muted);margin-bottom:1rem}
.fg{margin-bottom:.875rem}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:.3rem}
.fg input,.fg textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit;color:var(--text);transition:border-color .18s;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:80px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .18s;margin-top:.25rem}
.btn-submit:hover{background:var(--accent-l)}
.success-wrap{text-align:center;padding:2.5rem 1rem}
.success-wrap .si{font-size:2.5rem;margin-bottom:.5rem}
.success-wrap h3{font-size:1.1rem;font-weight:700;margin-bottom:.35rem}
.success-wrap p{color:var(--muted);font-size:.85rem}
footer{text-align:center;padding:1.25rem;background:#fff;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">
    <div class="logo-mk" id="logoMk">C</div>
    <span class="logo-nm" id="brokerNm">Coastal Marine</span>
  </div>
  <span class="hdr-badge">Powered by SailShift AI</span>
</header>

<section class="hero">
  <h1 id="heroTitle">Browse Our Current Boat Listings</h1>
  <p id="heroSub">Premium powerboats and sportfishing vessels — select your price range</p>
  <div class="tabs">
    <button class="tab" data-r="budget" onclick="switchTab('budget')">Value · $50k–$150k</button>
    <button class="tab" data-r="mid" onclick="switchTab('mid')">Mid-Range · $150k–$500k</button>
    <button class="tab" data-r="premium" onclick="switchTab('premium')">Premium · $500k–$3M</button>
  </div>
</section>

<div class="stats">
  <span class="stats-txt"><strong id="listCt">20</strong> listings available</span>
  <div class="stats-sort">Sort: <select class="sort-sel" id="sortSel" onchange="render()">
    <option value="default">Featured</option>
    <option value="price-asc">Price ↑</option>
    <option value="price-desc">Price ↓</option>
    <option value="year-desc">Newest first</option>
    <option value="length-desc">Longest first</option>
  </select></div>
</div>

<main class="wrap"><div class="grid" id="grid"></div></main>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <button class="m-close" onclick="closeModal()">×</button>
    <img class="m-img" id="mImg" src="" alt="" onerror="this.style.background='linear-gradient(135deg,#9db8c8,#5a7f9a)';this.src=''">
    <div class="m-body">
      <div id="mContent"></div>
    </div>
  </div>
</div>

<footer>
  <p>Listings managed by <a href="#">SailShift AI</a> · Intelligent lead management for marine dealers</p>
</footer>

<script>
(function(){
  const p = new URLSearchParams(location.search);
  const broker = p.get('broker') || 'Coastal Marine';
  const colour = p.get('colour') || '0d3b6e';
  const range  = p.get('range')  || 'mid';
  document.getElementById('brokerNm').textContent = broker;
  document.getElementById('logoMk').textContent   = broker.charAt(0).toUpperCase();
  document.getElementById('heroTitle').textContent = `Browse ${broker}'s Current Listings`;
  document.documentElement.style.setProperty('--accent', '#' + colour.replace('#',''));
  document.documentElement.style.setProperty('--accent-l', '#' + lighten(colour.replace('#','')));
  window._INIT_RANGE = range;
})();

function lighten(hex){
  try{
    let r=parseInt(hex.slice(0,2),16)+30, g=parseInt(hex.slice(2,4),16)+30, b=parseInt(hex.slice(4,6),16)+30;
    return [Math.min(r,255),Math.min(g,255),Math.min(b,255)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }catch(e){return '1a5a9e';}
}

let curRange = 'mid';

document.addEventListener('DOMContentLoaded', () => { switchTab(window._INIT_RANGE || 'mid'); });

function switchTab(r) {
  curRange = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.r === r));
  render();
}

function fmt(n){ return '$' + n.toLocaleString('en-US'); }

function render() {
  const sort = document.getElementById('sortSel').value;
  let items = [...DATA[curRange]];
  if (sort === 'price-asc')   items.sort((a,b) => a.price - b.price);
  if (sort === 'price-desc')  items.sort((a,b) => b.price - a.price);
  if (sort === 'year-desc')   items.sort((a,b) => b.year - a.year);
  if (sort === 'length-desc') items.sort((a,b) => parseFloat(b.loa) - parseFloat(a.loa));
  document.getElementById('listCt').textContent = items.length;
  document.getElementById('grid').innerHTML = items.map(card).join('');
}

function card(L) {
  return `
  <div class="card" onclick="openModal(${L.id})">
    <div class="c-img-wrap">
      <img class="c-img" src="${img(L.i)}" alt="${L.make} ${L.model}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#9db8c8,#5a7f9a)';this.removeAttribute('src')">
      <span class="c-price-badge">${fmt(L.price)}</span>
    </div>
    <div class="c-body">
      <div class="c-title">${L.make} ${L.model} <span class="c-year">${L.year}</span></div>
      <div class="c-specs">
        <span class="chip">⚓ ${L.loa.split('/')[0].trim()}</span>
        <span class="chip">🛏 ${L.berths} berths</span>
        <span class="chip">⚙️ ${L.hp.toLocaleString()}hp</span>
        <span class="chip">🕐 ${L.hrs} hrs</span>
      </div>
      <div class="c-loc">📍 ${L.loc}</div>
      <div class="c-desc">${L.desc}</div>
      <div class="c-foot">
        <span class="c-price">${fmt(L.price)}</span>
        <button class="btn-view">View Listing</button>
      </div>
    </div>
  </div>`;
}

function findListing(id) {
  for (const band of Object.values(DATA)) {
    const l = band.find(x => x.id === id);
    if (l) return l;
  }
}

function openModal(id) {
  const L = findListing(id);
  if (!L) return;
  document.getElementById('mImg').src = img(L.i);
  document.getElementById('mImg').alt = `${L.make} ${L.model}`;
  document.getElementById('mImg').style.display = '';
  document.getElementById('mContent').innerHTML = detailHTML(L);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function bgClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function detailHTML(L) {
  return `
    <div class="m-header">
      <div class="m-title-block">
        <div class="m-make">${L.make} ${L.model}</div>
        <div class="m-sub">${L.year} · ${L.type} · ${L.cond} condition · ${L.loc}</div>
      </div>
      <div class="m-price-block">
        <div class="m-price">${fmt(L.price)}</div>
        <div class="m-price-note">Asking price</div>
      </div>
    </div>

    <div class="spec-grid">
      <div class="spec-box"><div class="sk">LOA</div><div class="sv">${L.loa.split('/')[0].trim()}</div></div>
      <div class="spec-box"><div class="sk">Beam</div><div class="sv">${L.beam.split('/')[0].trim()}</div></div>
      <div class="spec-box"><div class="sk">Draft</div><div class="sv">${L.draft.split('/')[0].trim()}</div></div>
      <div class="spec-box"><div class="sk">Total HP</div><div class="sv">${L.hp.toLocaleString()}hp</div></div>
      <div class="spec-box"><div class="sk">Berths</div><div class="sv">${L.berths}</div></div>
      <div class="spec-box"><div class="sk">Cabins</div><div class="sv">${L.cabins}</div></div>
      <div class="spec-box"><div class="sk">Heads</div><div class="sv">${L.heads}</div></div>
      <div class="spec-box"><div class="sk">Engine hrs</div><div class="sv">${L.hrs} hrs</div></div>
    </div>

    <div class="m-section">
      <h4>Description</h4>
      <p style="font-size:.88rem;line-height:1.7;color:#374151">${L.desc}</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem">
      <div class="m-section" style="margin:0">
        <h4>Engines &amp; Performance</h4>
        <table class="spec-tbl">
          <tr><td>Engine(s)</td><td>${L.engines}</td></tr>
          <tr><td>Total horsepower</td><td>${L.hp.toLocaleString()}hp</td></tr>
          <tr><td>Engine hours</td><td>${L.hrs} hrs</td></tr>
          <tr><td>Last service</td><td>${L.svc}</td></tr>
          <tr><td>Top speed</td><td>${L.speed}</td></tr>
        </table>
      </div>
      <div class="m-section" style="margin:0">
        <h4>Hull &amp; Construction</h4>
        <table class="spec-tbl">
          <tr><td>Type</td><td>${L.type}</td></tr>
          <tr><td>Hull</td><td>${L.hull}</td></tr>
          <tr><td>Fuel capacity</td><td>${L.fuel}</td></tr>
          <tr><td>Condition</td><td>${L.cond}</td></tr>
        </table>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div class="m-section" style="margin:0">
        <h4>Electronics</h4>
        <table class="spec-tbl">
          <tr><td>Chartplotter</td><td>${L.plotter}</td></tr>
          <tr><td>VHF radio</td><td>${L.vhf}</td></tr>
          <tr><td>Radar</td><td>${L.radar}</td></tr>
          <tr><td>Depth / Fish finder</td><td>${L.depth}</td></tr>
        </table>
      </div>
      <div class="m-section" style="margin:0">
        <h4>Accommodation</h4>
        <table class="spec-tbl">
          <tr><td>Sleeping berths</td><td>${L.berths}</td></tr>
          <tr><td>Staterooms</td><td>${L.cabins}</td></tr>
          <tr><td>Heads</td><td>${L.heads}</td></tr>
        </table>
      </div>
    </div>

    <div class="m-section"><h4>Request Information</h4></div>
    <p class="m-enq-sub">Complete the form and ${document.getElementById('brokerNm').textContent} will respond within the hour.</p>
    <form id="enqForm" onsubmit="submitEnq(event)">
      <input type="hidden" name="listing" value="${L.make} ${L.model} ${L.year} — ${fmt(L.price)}">
      <div class="fg-row">
        <div class="fg"><label>First Name</label><input type="text" name="fn" required placeholder="James"></div>
        <div class="fg"><label>Last Name</label><input type="text" name="ln" required placeholder="Henderson"></div>
      </div>
      <div class="fg"><label>Email</label><input type="email" name="email" required placeholder="james@example.com"></div>
      <div class="fg"><label>Phone</label><input type="tel" name="phone" placeholder="+1 (555) 000-0000"></div>
      <div class="fg"><label>Message</label><textarea name="msg">I'm interested in the ${L.make} ${L.model} (${L.year}) listed at ${fmt(L.price)}. Please contact me to arrange a showing.</textarea></div>
      <button type="submit" class="btn-submit">Send Enquiry</button>
    </form>`;
}

function submitEnq(e) {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form));
  const WEBHOOK = 'https://your-n8n-instance.com/webhook/sailshift-us';
  fetch(WEBHOOK, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...data, broker: document.getElementById('brokerNm').textContent, market:'US', ts: new Date().toISOString()})})
    .catch(()=>{});
  document.getElementById('mContent').innerHTML = `
    <div class="success-wrap">
      <div class="si">✓</div>
      <h3>Enquiry Sent</h3>
      <p>${document.getElementById('brokerNm').textContent} will be in touch shortly.<br>Average response time: under 1 hour.</p>
      <button onclick="closeModal()" style="margin-top:1.25rem;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit">Back to Listings</button>
    </div>`;
  document.getElementById('mImg').style.display='none';
}
</script>
