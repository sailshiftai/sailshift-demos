<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yacht Listings — Powered by SailShift AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2137;--navy-d:#071528;
  --accent:#0e7490;--accent-l:#0891b2;
  --text:#0f172a;--text-2:#334155;--muted:#64748b;
  --border:#e2e8f0;--bg:#f1f5f9;--card:#fff;--chip:#e8eef4;--r:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.hdr{background:var(--navy);height:64px;display:flex;align-items:center;padding:0 2rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.25)}
.hdr-inner{width:100%;max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.5px;flex-shrink:0}
.logo-name{font-weight:700;font-size:17px;color:#fff;letter-spacing:-.2px}
.hdr-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);padding:5px 14px;border-radius:20px;font-size:11.5px;font-weight:500;letter-spacing:.4px}
.hero{background:linear-gradient(160deg,var(--navy) 0%,var(--navy-d) 100%);padding:3.5rem 2rem 3rem;text-align:center;color:#fff}
.hero-inner{max-width:640px;margin:0 auto}
.hero-eyebrow{font-size:.78rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.9rem}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:400;letter-spacing:-.5px;margin-bottom:.7rem;line-height:1.2}
.hero-sub{color:rgba(255,255,255,.6);font-size:.95rem;line-height:1.6;margin-bottom:2.25rem}
.price-nav{display:inline-flex;background:rgba(255,255,255,.1);border-radius:12px;padding:5px;gap:4px}
.pnav-btn{padding:10px 26px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:'Inter',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.pnav-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.pnav-btn.active{background:#fff;color:var(--accent);font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.controls{background:#fff;border-bottom:1px solid var(--border);padding:.8rem 2rem}
.controls-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.listing-ct{font-size:.85rem;color:var(--muted)}.listing-ct strong{color:var(--text);font-weight:600}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--muted)}
.sort-sel{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;font-family:'Inter',sans-serif;color:var(--text);background:#fff;cursor:pointer;outline:none;transition:border-color .15s}
.sort-sel:focus{border-color:var(--accent)}
.wrap{max-width:1280px;margin:0 auto;padding:2rem 1.5rem 5rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.grid{grid-template-columns:1fr}.wrap{padding:1.5rem 1rem 3.5rem}.hero{padding:2.5rem 1rem 2.5rem}.hdr{padding:0 1rem}}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.07);transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06)}
.c-img-wrap{position:relative;overflow:hidden}
.c-img{width:100%;height:220px;object-fit:cover;display:block;background:linear-gradient(135deg,#1a4a6e,#0d2137);transition:transform .4s}
.card:hover .c-img{transform:scale(1.04)}
.c-body{padding:1.35rem 1.35rem 1.25rem;flex:1;display:flex;flex-direction:column;gap:.85rem}
.c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.c-make{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:.2rem}
.c-model{font-size:1.02rem;font-weight:700;color:var(--text);letter-spacing:-.2px;line-height:1.3}
.c-year{font-weight:400;color:var(--muted);font-size:.9rem}
.c-price-block{text-align:right;flex-shrink:0}
.c-price{font-size:1.12rem;font-weight:800;color:var(--accent);letter-spacing:-.3px}
.c-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--chip);color:var(--text-2);padding:4px 10px;border-radius:5px;font-size:.7rem;font-weight:600;letter-spacing:.35px;text-transform:uppercase;white-space:nowrap}
.c-loc{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);line-height:1}
.c-loc svg{flex-shrink:0;color:var(--muted)}
.c-desc{font-size:.82rem;color:var(--text-2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.c-foot{margin-top:auto;padding-top:.75rem;border-top:1px solid var(--border)}
.btn-view{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .18s;font-family:'Inter',sans-serif;letter-spacing:.1px}
.btn-view:hover{background:var(--accent-l)}
.overlay{display:none;position:fixed;inset:0;background:rgba(7,21,40,.7);backdrop-filter:blur(4px);z-index:500;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:800px;overflow:hidden;position:relative;margin:auto;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.m-close{position:absolute;top:14px;right:14px;z-index:10;background:rgba(0,0,0,.5);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.m-close:hover{background:rgba(0,0,0,.75)}
.m-img{width:100%;height:300px;object-fit:cover;display:block;background:linear-gradient(135deg,#1a4a6e,#0d2137)}
.m-body{padding:2rem}
.m-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1.5rem;margin-bottom:1.75rem;flex-wrap:wrap}
.m-make{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:.3rem}
.m-title{font-family:'DM Serif Display',serif;font-size:1.7rem;font-weight:400;letter-spacing:-.3px;color:var(--text);line-height:1.2}
.m-sub{font-size:.84rem;color:var(--muted);margin-top:.4rem;line-height:1.5}
.m-price-block{text-align:right;flex-shrink:0}
.m-price{font-size:1.9rem;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.m-price-note{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.75rem}
@media(max-width:560px){.spec-grid{grid-template-columns:repeat(2,1fr)}}
.spec-box{background:var(--bg);border-radius:10px;padding:.75rem 1rem}
.sk{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:.3rem}
.sv{font-size:.95rem;font-weight:700;color:var(--text)}
.m-section{margin-bottom:1.5rem}
.m-section h4{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.spec-tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.spec-tbl td{padding:.4rem 0;vertical-align:top;line-height:1.5}
.spec-tbl td:first-child{color:var(--muted);width:46%;padding-right:.5rem}
.spec-tbl td:last-child{font-weight:500;color:var(--text-2)}
.m-desc{font-size:.88rem;line-height:1.75;color:var(--text-2);margin-bottom:1.75rem}
.m-enq-sub{font-size:.83rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
.fg{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
@media(max-width:480px){.fg-row{grid-template-columns:1fr}}
.fg label{font-size:.78rem;font-weight:600;color:var(--text)}
.fg input,.fg textarea{border:1px solid var(--border);border-radius:9px;padding:.6rem .85rem;font-size:.88rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color .15s;background:#fff;width:100%}
.fg input:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,116,144,.08)}
.fg textarea{resize:vertical;min-height:80px}
.btn-submit{width:100%;background:var(--accent);color:#fff;border:none;padding:.9rem;border-radius:9px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .18s;margin-top:.25rem}
.btn-submit:hover{background:var(--accent-l)}
.success-wrap{text-align:center;padding:3rem 1.5rem}
.si{width:56px;height:56px;border-radius:50%;background:#dcfce7;color:#16a34a;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.si svg{width:24px;height:24px}
footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:1.5rem;font-size:.78rem}
footer a{color:rgba(255,255,255,.75);text-decoration:none}
/* ── CAROUSEL ── */
.carousel{position:relative;width:100%;height:300px;background:linear-gradient(135deg,#1a4a6e,#0d2137);overflow:hidden;flex-shrink:0}
.car-slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s ease}
.car-slide.active{opacity:1}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.car-btn:hover{background:rgba(0,0,0,.7)}
.car-prev{left:14px}.car-next{right:14px}
.car-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.car-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;border:none;padding:0}
.car-dot.active{background:#fff;transform:scale(1.25)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-mark" id="logoMk">C</div>
      <span class="logo-name" id="brokerNm">Coastal Yacht Sales</span>
    </div>
    <span class="hdr-badge">Powered by SailShift AI</span>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Current Inventory</p>
    <h1 id="heroTitle">Browse Our Listings</h1>
    <p class="hero-sub" id="heroSub">Sailing yachts and cruising vessels — select your price range below</p>
    <nav class="price-nav">
      <button class="pnav-btn" data-r="budget" onclick="switchTab('budget')">Under $100k</button>
      <button class="pnav-btn" data-r="mid"    onclick="switchTab('mid')">$100k – $350k</button>
      <button class="pnav-btn" data-r="premium" onclick="switchTab('premium')">$350k +</button>
    </nav>
  </div>
</section>

<div class="controls">
  <div class="controls-inner">
    <span class="listing-ct"><strong id="listCt">12</strong> listings available</span>
    <div class="sort-wrap">Sort by:
      <select class="sort-sel" id="sortSel" onchange="render()">
        <option value="default">Featured</option>
        <option value="price-asc">Price — low to high</option>
        <option value="price-desc">Price — high to low</option>
        <option value="year-desc">Newest first</option>
        <option value="length-desc">Longest first</option>
      </select>
    </div>
  </div>
</div>

<main class="wrap"><div class="grid" id="grid"></div></main>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <button class="m-close" onclick="closeModal()">&#x2715;</button>
    <div class="carousel" id="mCarousel">
      <button class="car-btn car-prev" onclick="carPrev()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="car-btn car-next" onclick="carNext()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      <div class="car-dots" id="carDots"></div>
    </div>
    <div class="m-body"><div id="mContent"></div></div>
  </div>
</div>

<footer>
  <p>Listings managed by <a href="#">SailShift AI</a> &mdash; Intelligent lead management for marine dealers</p>
</footer>

<script>
(function(){
  const p=new URLSearchParams(location.search);
  const broker=p.get('broker')||'Coastal Yacht Sales';
  const colour=p.get('colour')||'0e7490';
  const range=p.get('range')||'mid';
  document.getElementById('brokerNm').textContent=broker;
  document.getElementById('logoMk').textContent=broker.charAt(0).toUpperCase();
  document.getElementById('heroTitle').textContent=`Browse ${broker}'s Current Listings`;
  document.documentElement.style.setProperty('--accent','#'+colour.replace('#',''));
  document.documentElement.style.setProperty('--accent-l','#'+lighten(colour.replace('#','')));
  window._INIT_RANGE=range;
})();
function lighten(h){try{let r=parseInt(h.slice(0,2),16)+28,g=parseInt(h.slice(2,4),16)+28,b=parseInt(h.slice(4,6),16)+28;return[Math.min(r,255),Math.min(g,255),Math.min(b,255)].map(x=>x.toString(16).padStart(2,'0')).join('');}catch(e){return'0891b2';}}

function img(id){return`images/uss-${id}/1.jpg`;}
function imgSet(id){return[`images/uss-${id}/1.jpg`,`images/uss-${id}/2.jpg`,`images/uss-${id}/3.jpg`];}

    {id:3,  make:'Beneteau',        model:'Oceanis 38',      year:2013,price:74000, loa:"38'9\"",beam:"12'10\"",draft:"5'11\"",disp:'14,800 lbs',rig:'Sloop',sails:'612 sq ft',eng:'Yanmar 3YM30, 27hp',hrs:490,svc:2024,berths:6,cabs:2,heads:2,keel:'Fin keel',hull:'GRP',cond:'Very Good', plotter:'B&G Zeus 7',         vhf:'Standard Horizon GX1600',ais:'Class B',ap:'B&G H5000 Pilot',windlass:'Maxwell HRC8 elec.',loc:'Marblehead, MA',   desc:'Sporty French cruiser with two full heads and private forward cabin. Electric furling main, carbon boom, full Sunbrella canvas. Recent antifoul. Ready for New England offshore.'},
    {id:4,  make:'Jeanneau',        model:'Sun Odyssey 45.2',year:2006,price:59000, loa:"44'7\"",beam:"13'6\"", draft:"6'3\"", disp:'22,500 lbs',rig:'Sloop',sails:'778 sq ft',eng:'Yanmar 4JH3-TCE, 53hp',hrs:840,svc:2023,berths:8,cabs:3,heads:2,keel:'Fin keel',hull:'GRP',cond:'Good',      plotter:'Garmin GPSMap 741',  vhf:'Icom IC-M422',           ais:'Class B',ap:'Simrad AP16',windlass:'Lofrans Project elec.',loc:'Seattle, WA',       desc:'Popular Pacific Northwest family cruiser. Three cabins, two heads, large saloon. Radar, chart table, full enclosure. Engine recently overhauled. Excellent value for the size.'},

    {id:9,  make:'Island Packet',   model:'370',             year:2001,price:65000, loa:"37'6\"",beam:"12'4\"", draft:"4'9\"", disp:'22,000 lbs',rig:'Sloop',sails:'610 sq ft',eng:'Universal M35, 35hp',hrs:1100,svc:2022,berths:4,cabs:2,heads:2,keel:'Full keel',hull:'GRP',cond:'Good',      plotter:'Garmin GPSMap 526s', vhf:'Icom IC-M422',           ais:'Class B',ap:'Simrad AP24',windlass:'Lofrans Project elec.',loc:'Annapolis, MD',    desc:'Island Packet quality is legendary — massively built, full keel, shallow draft. Life raft, EPIRB, storm sails and sea anchor included. Proven offshore passagemaker with Bahamas history.'},

let curRange='mid';
document.addEventListener('DOMContentLoaded',()=>{ switchTab(window._INIT_RANGE||'mid'); });

function switchTab(r){
  curRange=r;
  document.querySelectorAll('.pnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.r===r));
  render();
}

function fmt(n){return'$'+n.toLocaleString('en-US');}

function render(){
  const sort=document.getElementById('sortSel').value;
  let items=[...DATA[curRange]];
  if(sort==='price-asc')  items.sort((a,b)=>a.price-b.price);
  if(sort==='price-desc') items.sort((a,b)=>b.price-a.price);
  if(sort==='year-desc')  items.sort((a,b)=>b.year-a.year);
  if(sort==='length-desc')items.sort((a,b)=>parseFloat(b.loa)-parseFloat(a.loa));
  document.getElementById('listCt').textContent=items.length;
  document.getElementById('grid').innerHTML=items.map(card).join('');
}

const PIN=`<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

function card(L){return`
<div class="card" onclick="openModal(${L.id})">
  <div class="c-img-wrap"><img class="c-img" src="${img(L.id)}" alt="${L.make} ${L.model}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#1a4a6e,#0d2137)';this.removeAttribute('src')"></div>
  <div class="c-body">
    <div class="c-head">
      <div><div class="c-make">${L.make}</div><div class="c-model">${L.model} <span class="c-year">${L.year}</span></div></div>
      <div class="c-price-block"><div class="c-price">${fmt(L.price)}</div></div>
    </div>
    <div class="c-chips">
      <span class="chip">${L.loa}</span>
      <span class="chip">${L.rig}</span>
      <span class="chip">${L.berths} berths</span>
      <span class="chip">${L.hrs} hrs</span>
    </div>
    <div class="c-loc">${PIN} ${L.loc}</div>
    <div class="c-desc">${L.desc}</div>
    <div class="c-foot"><button class="btn-view">View full listing &rarr;</button></div>
  </div>
</div>`;}

function findListing(id){for(const b of Object.values(DATA)){const l=b.find(x=>x.id===id);if(l)return l;}}

function openModal(id){
  const L=findListing(id);if(!L)return;
  carInit(imgSet(L.id));
  document.getElementById('mContent').innerHTML=detailHTML(L);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function submitEnq(e){
  e.preventDefault();
  const data=Object.fromEntries(new FormData(e.target));
  fetch('https://your-n8n-instance.com/webhook/sailshift-us-sail',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...data,broker:document.getElementById('brokerNm').textContent,market:'US-Sail',ts:new Date().toISOString()})}).catch(()=>{});
  document.getElementById('mContent').innerHTML=`<div class="success-wrap"><div class="si"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><h3 style="font-size:1.3rem;margin-bottom:.5rem">Enquiry sent</h3><p style="color:var(--muted);font-size:.88rem;line-height:1.6">${document.getElementById('brokerNm').textContent} will be in touch shortly.<br>Average response time: under 1 hour.</p><button onclick="closeModal()" style="margin-top:1.5rem;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit">Back to listings</button></div>`;
  document.getElementById('mCarousel').style.display='none';
}

let _ci=0,_cs=[];
function carShow(i){
  _ci=(i+_cs.length)%_cs.length;
  document.querySelectorAll('#mCarousel .car-slide').forEach((s,j)=>s.classList.toggle('active',j===_ci));
  document.querySelectorAll('#carDots .car-dot').forEach((d,j)=>d.classList.toggle('active',j===_ci));
}
function carPrev(){carShow(_ci-1);}
function carNext(){carShow(_ci+1);}
function carInit(imgs){
  _cs=imgs;_ci=0;
  const c=document.getElementById('mCarousel');
  c.querySelectorAll('.car-slide').forEach(el=>el.remove());
  imgs.forEach((src,i)=>{
    const el=document.createElement('img');
    el.className='car-slide'+(i===0?' active':'');
    el.src=src;
    el.onerror=function(){this.style.display='none';};
    c.appendChild(el);
  });
  document.getElementById('carDots').innerHTML=imgs.map((_,i)=>`<button class="car-dot${i===0?' active':''}" onclick="carShow(${i})"></button>`).join('');
}
</script>
